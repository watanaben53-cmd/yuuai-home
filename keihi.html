<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>経費管理 | 優愛ホーム</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="経費管理">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

const entriesRef = db.ref('keihi/entries');
const staffRef = db.ref('keihi/staff');
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#185FA5;--blue-dark:#0f4070;--blue-light:#e8f1fb;
  --green:#2d7a5f;--red:#c0392b;
  --gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
  --gray-400:#94a3b8;--gray-600:#475569;--gray-800:#1e293b;
  --white:#ffffff;--radius:10px;--shadow:0 2px 12px rgba(0,0,0,0.1);
}
body{font-family:'Hiragino Kana','Hiragino Sans',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh}

.header{background:var(--blue);color:var(--white);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(24,95,165,0.3)}
.header-title{font-size:17px;font-weight:700}
.header-sub{font-size:11px;opacity:0.8;margin-top:1px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-400);transition:background 0.3s}
.sync-dot.ok{background:#4ade80}
.sync-dot.ng{background:#f87171}
.sync-dot.syncing{background:#facc15;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.nav{display:flex;background:var(--white);border-bottom:1px solid var(--gray-200);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex:none;padding:12px 18px;font-size:13px;font-weight:600;border:none;background:none;color:var(--gray-400);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.2s}
.nav-btn.active{color:var(--blue);border-bottom-color:var(--blue)}

.panel{display:none;padding:16px;max-width:640px;margin:0 auto}
.panel.active{display:block}

.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:14px}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
label{font-size:12px;font-weight:600;color:var(--gray-600)}
label .req{color:var(--red);margin-left:2px}
input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:14px;font-family:inherit;background:var(--white);color:var(--gray-800);transition:border 0.2s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
textarea{min-height:70px;resize:vertical}

/* 勘定科目AI判定バッジ */
.account-badge-wrap{display:none;align-items:center;gap:8px;padding:10px 12px;background:var(--blue-light);border-radius:8px;margin-bottom:10px}
.account-badge-label{font-size:12px;color:var(--gray-600)}
.account-badge{font-size:14px;font-weight:800;color:var(--blue)}
.account-badge-hint{font-size:11px;color:var(--gray-400);margin-left:auto}

.submit-btn{width:100%;padding:14px;background:var(--blue);color:var(--white);border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s}
.submit-btn:hover{background:var(--blue-dark)}
.submit-btn:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed}

/* 一覧 */
.month-select{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.month-select select{flex:1;font-weight:700;color:var(--blue)}
.filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{flex:none;padding:6px 14px;border-radius:20px;border:1.5px solid var(--gray-200);font-size:12px;font-weight:600;background:var(--white);color:var(--gray-600);cursor:pointer;transition:all 0.2s}
.filter-chip.active{background:var(--blue);color:var(--white);border-color:var(--blue)}

.entry-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:10px;border-left:4px solid var(--blue)}
.entry-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.entry-amount{font-size:20px;font-weight:800}
.entry-date{font-size:11px;color:var(--gray-400);margin-top:2px}
.entry-desc{font-size:13px;color:var(--gray-600);margin:6px 0}
.entry-meta{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-account{background:var(--blue-light);color:var(--blue)}
.tag-company{background:#fef9c3;color:#713f12}
.tag-staff{background:#f0fdf4;color:var(--green)}
.delete-btn{padding:4px 10px;border:1px solid var(--gray-200);border-radius:6px;font-size:11px;color:var(--gray-400);background:none;cursor:pointer;white-space:nowrap}
.delete-btn:hover{border-color:var(--red);color:var(--red)}

/* 集計 */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);text-align:center}
.stat-label{font-size:11px;color:var(--gray-400);margin-bottom:4px}
.stat-value{font-size:22px;font-weight:800;color:var(--blue)}
.account-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.account-row:last-child{border-bottom:none}
.account-bar{height:4px;background:var(--blue-light);border-radius:2px;margin-top:4px;overflow:hidden}
.account-bar-fill{height:100%;background:var(--blue);border-radius:2px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--gray-800);color:var(--white);padding:12px 20px;border-radius:8px;font-size:13px;z-index:999;transition:transform 0.3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">💴 経費管理</div>
    <div class="header-sub">優愛ホーム</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="syncDot" class="sync-dot"></div>
    <span id="syncLabel" style="font-size:11px;color:rgba(255,255,255,0.7)">接続中…</span>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPanel('entry')">📝 記録</button>
  <button class="nav-btn" onclick="showPanel('list')">📋 一覧</button>
  <button class="nav-btn" onclick="showPanel('summary')">📊 集計</button>
  <button class="nav-btn" onclick="showPanel('staff')">👤 担当者</button>
</nav>

<!-- ===== 記録パネル ===== -->
<div id="panel-entry" class="panel active">
  <div class="card">
    <div class="card-title">📝 経費を記録する</div>

    <div class="form-row full">
      <div class="form-group">
        <label>摘要（内容）<span class="req">*</span><span style="font-weight:400;color:var(--gray-400);margin-left:6px;font-size:11px">入力すると勘定科目を自動判定</span></label>
        <textarea id="desc" placeholder="例：現場移動のガソリン代、打合せの昼食代など" oninput="autoJudgeAccount()"></textarea>
      </div>
    </div>

    <!-- AI判定バッジ -->
    <div class="account-badge-wrap" id="accountBadgeWrap">
      <span class="account-badge-label">🤖 AI判定：</span>
      <span class="account-badge" id="accountBadge"></span>
      <span class="account-badge-hint">変更可↓</span>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>日付<span class="req">*</span></label>
        <input type="date" id="date" required>
      </div>
      <div class="form-group">
        <label>金額（円）<span class="req">*</span></label>
        <input type="number" id="amount" placeholder="例：3800">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>取引先・店名</label>
        <input type="text" id="company" placeholder="例：ENEOSスタンド">
      </div>
      <div class="form-group">
        <label>消費税（円）</label>
        <input type="number" id="tax" placeholder="例：345">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>担当者</label>
        <select id="staff">
          <option value="">選択してください</option>
        </select>
      </div>
      <div class="form-group">
        <label>勘定科目</label>
        <select id="account" onchange="onAccountManualChange()">
          <option value="">─ 自動判定 ─</option>
          <option>旅費交通費</option><option>交際費</option><option>会議費</option>
          <option>消耗品費</option><option>通信費</option><option>広告宣伝費</option>
          <option>外注費</option><option>修繕費</option><option>水道光熱費</option>
          <option>地代家賃</option><option>損害保険料</option><option>福利厚生費</option>
          <option>給料賃金</option><option>減価償却費</option><option>雑費</option>
        </select>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitEntry()">💾 記録する</button>
  </div>
</div>

<!-- ===== 一覧パネル ===== -->
<div id="panel-list" class="panel">
  <div class="month-select">
    <label style="font-size:13px;color:var(--gray-600);white-space:nowrap">表示月：</label>
    <select id="listMonth" onchange="renderList()"></select>
  </div>
  <div class="filter-row" id="filterRow"></div>
  <div id="listContainer"></div>
</div>

<!-- ===== 集計パネル ===== -->
<div id="panel-summary" class="panel">
  <div class="month-select">
    <label style="font-size:13px;color:var(--gray-600);white-space:nowrap">集計月：</label>
    <select id="summaryMonth" onchange="renderSummary()"></select>
  </div>
  <div class="summary-grid" id="summaryStats"></div>
  <div class="card">
    <div class="card-title">📂 勘定科目別内訳</div>
    <div id="accountBreakdown"></div>
  </div>
</div>

<!-- ===== 担当者パネル ===== -->
<div id="panel-staff" class="panel">
  <div class="card">
    <div class="card-title">👤 担当者を追加</div>
    <div class="form-row full">
      <div class="form-group">
        <label>氏名</label>
        <input type="text" id="staffName" placeholder="例：田中 太郎">
      </div>
    </div>
    <button class="submit-btn" onclick="addStaff()">追加する</button>
  </div>
  <div class="card">
    <div class="card-title">担当者一覧</div>
    <div id="staffList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =====================
// 状態
// =====================
let entries = [];
let staffMembers = [];
let currentFilter = 'all';
let manualAccountSelected = false;

// =====================
// Firebase同期
// =====================
function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  dot.className = 'sync-dot';
  if (state==='ok'){ dot.classList.add('ok'); label.textContent='同期済み'; }
  else if (state==='ng'){ dot.classList.add('ng'); label.textContent='同期エラー'; }
  else { dot.classList.add('syncing'); label.textContent='同期中…'; }
}

function initFirebase() {
  setSyncStatus('syncing');
  entriesRef.on('value', snap => {
    const d = snap.val();
    entries = d ? Object.values(d) : [];
    entries.sort((a,b) => b.date.localeCompare(a.date));
    renderList(); renderSummary();
    setSyncStatus('ok');
  }, () => setSyncStatus('ng'));

  staffRef.on('value', snap => {
    const d = snap.val();
    staffMembers = d ? Object.values(d) : [];
    staffMembers.sort((a,b) => a.name.localeCompare(b.name,'ja'));
    renderStaffSelect(); renderStaffList();
  });
}

// =====================
// パネル切り替え
// =====================
function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  const idx = ['entry','list','summary','staff'].indexOf(id);
  document.querySelectorAll('.nav-btn')[idx]?.classList.add('active');
  if (id==='list') renderList();
  if (id==='summary') renderSummary();
}

// =====================
// 月セレクト生成
// =====================
function buildMonthOptions() {
  const now = new Date();
  let opts = '';
  for (let i=0; i<12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const val = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const lbl = d.getFullYear()+'年'+(d.getMonth()+1)+'月';
    opts += '<option value="'+val+'">'+lbl+'</option>';
  }
  document.getElementById('listMonth').innerHTML = opts;
  document.getElementById('summaryMonth').innerHTML = opts;
}

// =====================
// 勘定科目 自動判定
// =====================
const ACCOUNT_RULES = [
  { keys:['ガソリン','給油','燃料','高速','駐車','電車','バス','タクシー','交通','移動','出張','運賃','切符'], account:'旅費交通費' },
  { keys:['接待','会食','飲み会','居酒屋','レストラン','食事','昼食','夕食','ランチ','ディナー','カフェ','喫茶','飲食'], account:'交際費' },
  { keys:['会議','打合せ','打ち合わせ','ミーティング','会合','コーヒー代'], account:'会議費' },
  { keys:['文具','事務用品','コピー用紙','印刷','トナー','ボールペン','ノート','封筒','クリップ'], account:'消耗品費' },
  { keys:['電話','携帯','スマホ','インターネット','通信','郵便','宅配','運送','切手'], account:'通信費' },
  { keys:['広告','チラシ','看板','ホームページ','宣伝','PR','SNS','折込'], account:'広告宣伝費' },
  { keys:['外注','下請','業務委託','アルバイト','パート','協力'], account:'外注費' },
  { keys:['修理','修繕','補修','メンテナンス','点検'], account:'修繕費' },
  { keys:['電気','水道','ガス','光熱','電力'], account:'水道光熱費' },
  { keys:['家賃','賃料','駐車場代','リース','レンタル','借'], account:'地代家賃' },
  { keys:['保険料','保険'], account:'損害保険料' },
  { keys:['慶弔','弔慰','お祝い','冠婚葬祭','健康診断','レクリエーション','制服','作業着'], account:'福利厚生費' },
  { keys:['材料','資材','部材','建材','工具','道具'], account:'消耗品費' },
];

let judgeTimer = null;
function autoJudgeAccount() {
  if (manualAccountSelected) return;
  clearTimeout(judgeTimer);
  judgeTimer = setTimeout(() => {
    const text = document.getElementById('desc').value;
    if (!text.trim()) { hideAccountBadge(); return; }
    for (const rule of ACCOUNT_RULES) {
      if (rule.keys.some(k => text.includes(k))) {
        applyAccountJudge(rule.account);
        return;
      }
    }
    applyAccountJudge('雑費');
  }, 400);
}

function applyAccountJudge(account) {
  document.getElementById('accountBadge').textContent = account;
  document.getElementById('accountBadgeWrap').style.display = 'flex';
  const sel = document.getElementById('account');
  for (let i=0; i<sel.options.length; i++) {
    if (sel.options[i].text === account) { sel.selectedIndex = i; break; }
  }
}

function hideAccountBadge() {
  document.getElementById('accountBadgeWrap').style.display = 'none';
}

function onAccountManualChange() {
  const val = document.getElementById('account').value;
  if (val) {
    manualAccountSelected = true;
    document.getElementById('accountBadge').textContent = val;
    document.getElementById('accountBadgeWrap').style.display = 'flex';
    document.getElementById('accountBadgeWrap').querySelector('.account-badge-hint').textContent = '手動選択';
  } else {
    manualAccountSelected = false;
    autoJudgeAccount();
  }
}

// =====================
// 記録を保存
// =====================
function submitEntry() {
  const date = document.getElementById('date').value;
  const amount = document.getElementById('amount').value;
  const desc = document.getElementById('desc').value.trim();
  if (!date || !amount || !desc) { showToast('日付・金額・摘要は必須です', 'error'); return; }

  const account = document.getElementById('account').value || document.getElementById('accountBadge').textContent || '雑費';

  const entry = {
    id: 'e_'+Date.now(),
    date,
    amount: Number(amount),
    tax: Number(document.getElementById('tax').value) || 0,
    company: document.getElementById('company').value.trim(),
    account,
    desc,
    staff: document.getElementById('staff').value,
    createdAt: new Date().toISOString()
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '保存中…';
  entriesRef.child(entry.id).set(entry).then(() => {
    showToast('✅ 記録しました！', 'success');
    resetForm();
  }).catch(() => {
    showToast('保存に失敗しました', 'error');
  }).finally(() => {
    btn.disabled = false; btn.textContent = '💾 記録する';
  });
}

function resetForm() {
  document.getElementById('desc').value = '';
  document.getElementById('amount').value = '';
  document.getElementById('tax').value = '';
  document.getElementById('company').value = '';
  document.getElementById('account').selectedIndex = 0;
  document.getElementById('staff').selectedIndex = 0;
  manualAccountSelected = false;
  hideAccountBadge();
  // 日付は今日のまま残す
}

// =====================
// 一覧
// =====================
function setFilter(val, el) {
  currentFilter = val;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const month = document.getElementById('listMonth').value;
  const monthEntries = entries.filter(e => e.date.startsWith(month));
  const filtered = currentFilter==='all' ? monthEntries : monthEntries.filter(e => e.account===currentFilter);

  // フィルターチップ
  const accounts = [...new Set(monthEntries.map(e => e.account).filter(Boolean))];
  let chips = '<div class="filter-chip'+(currentFilter==='all'?' active':'')+'" onclick="setFilter(\'all\',this)">すべて</div>';
  accounts.forEach(a => {
    chips += '<div class="filter-chip'+(currentFilter===a?' active':'')+'" onclick="setFilter(\''+escHtml(a)+'\',this)">'+escHtml(a)+'</div>';
  });
  document.getElementById('filterRow').innerHTML = chips;

  const container = document.getElementById('listContainer');
  if (!filtered.length) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray-400)">記録がありません</div>';
    return;
  }

  container.innerHTML = filtered.map(e =>
    '<div class="entry-card">'+
      '<div class="entry-header">'+
        '<div>'+
          '<div class="entry-amount">¥'+Number(e.amount).toLocaleString()+'</div>'+
          '<div class="entry-date">'+e.date+(e.tax?'　税'+Number(e.tax).toLocaleString()+'円':'')+'</div>'+
        '</div>'+
        '<button class="delete-btn" onclick="deleteEntry(\''+e.id+'\')">削除</button>'+
      '</div>'+
      '<div class="entry-desc">'+escHtml(e.desc)+'</div>'+
      '<div class="entry-meta">'+
        (e.account?'<span class="tag tag-account">'+escHtml(e.account)+'</span>':'')+
        (e.company?'<span class="tag tag-company">🏢 '+escHtml(e.company)+'</span>':'')+
        (e.staff?'<span class="tag tag-staff">👤 '+escHtml(e.staff)+'</span>':'')+
      '</div>'+
    '</div>'
  ).join('');
}

function deleteEntry(id) {
  if (!confirm('この記録を削除しますか？')) return;
  entriesRef.child(id).remove().then(() => showToast('削除しました', 'success'));
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =====================
// 集計
// =====================
function renderSummary() {
  const month = document.getElementById('summaryMonth').value;
  const filtered = entries.filter(e => e.date.startsWith(month));
  const total = filtered.reduce((s,e) => s+e.amount, 0);

  document.getElementById('summaryStats').innerHTML =
    '<div class="stat-card"><div class="stat-label">合計金額</div><div class="stat-value">¥'+total.toLocaleString()+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">件数</div><div class="stat-value">'+filtered.length+'件</div></div>';

  const byAccount = {};
  filtered.forEach(e => { const a=e.account||'未分類'; byAccount[a]=(byAccount[a]||0)+e.amount; });
  const sorted = Object.entries(byAccount).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0]?.[1]||1;

  document.getElementById('accountBreakdown').innerHTML = sorted.length ?
    sorted.map(([a,amt]) =>
      '<div class="account-row">'+
        '<div style="flex:1">'+
          '<div style="font-size:13px">'+escHtml(a)+'</div>'+
          '<div class="account-bar"><div class="account-bar-fill" style="width:'+(amt/max*100)+'%"></div></div>'+
        '</div>'+
        '<div style="font-size:14px;font-weight:700;margin-left:12px">¥'+amt.toLocaleString()+'</div>'+
      '</div>'
    ).join('') :
    '<div style="color:var(--gray-400);text-align:center;padding:20px">データがありません</div>';
}

// =====================
// 担当者
// =====================
function renderStaffSelect() {
  const sel = document.getElementById('staff');
  const cur = sel.value;
  sel.innerHTML = '<option value="">選択してください</option>'+
    staffMembers.map(s=>'<option value="'+escHtml(s.name)+'">'+escHtml(s.name)+'</option>').join('');
  sel.value = cur;
}

function renderStaffList() {
  const el = document.getElementById('staffList');
  if (!staffMembers.length) {
    el.innerHTML = '<div style="color:var(--gray-400);text-align:center;padding:20px">担当者が登録されていません</div>';
    return;
  }
  el.innerHTML = staffMembers.map(s=>
    '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-100)">'+
      '<span style="font-size:14px">'+escHtml(s.name)+'</span>'+
      '<button class="delete-btn" onclick="deleteStaff(\''+s.id+'\')">削除</button>'+
    '</div>'
  ).join('');
}

function addStaff() {
  const name = document.getElementById('staffName').value.trim();
  if (!name) { showToast('氏名を入力してください', 'error'); return; }
  const s = { id:'s_'+Date.now(), name };
  staffRef.child(s.id).set(s).then(() => {
    document.getElementById('staffName').value = '';
    showToast('担当者を追加しました', 'success');
  });
}

function deleteStaff(id) {
  if (!confirm('削除しますか？')) return;
  staffRef.child(id).remove();
}

// =====================
// トースト
// =====================
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast '+(type||'');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// =====================
// 初期化
// =====================
function init() {
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
  buildMonthOptions();
  initFirebase();
}
init();
</script>
</body>
</html>
